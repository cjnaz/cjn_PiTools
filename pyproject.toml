[project]
name = 'cjn_PiFuncs'
version = "1.0b1"
    # 1.0b1 - Gathered PiOLED, piblinky
description = "cjn's library of Raspberry Pi functions, drivers, tools, ..."
readme = "README.md"
requires-python = ">=3.9"
authors = [ {name = "Chris Nelson", email = "github@cjnaz.com"} ]
license = "MIT"
dependencies = [
    'cjnfuncs >= 3.1.1rc2',
    'luma.oled',
    'pillow',
    'spidev',
    'RPi.GPIO',
    ]
classifiers = [                 # https://pypi.org/classifiers/
    "Topic :: Software Development :: Libraries :: Python Modules",
    ]


[project.optional-dependencies]
pigpio = [
    "pigpio",
    ]


[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"


[project.scripts]
pioled ='cjn_PiFuncs.PiOLED:cli'


[project.urls]
repository = "https://github.com/cjnaz/cjn_PiFuncs"


[tool.setuptools]
include-package-data = true


[tool.setuptools.packages.find]
where = ["src"]


[tool.setuptools.package-data]
'*' = ['fonts/*', 'deployment_files/*']